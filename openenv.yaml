spec_version: 1
name: bug-triage-env
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: Bug triage RL environment with 3 tasks of increasing difficulty
endpoint: https://siteshcodes-bug-triage-env.hf.space
tags:
  - openenv
  - bug-triage
  - real-world
  - nlp
tasks:
  - id: easy
    description: Assign priority
    grader: server.task:priority_match
    reward_range: [0.0, 1.0]
  - id: medium
    description: Assign priority, labels, team
    grader: server.task:priority_label_team
    reward_range: [0.0, 1.0]
  - id: hard
    description: Full triage
    grader: server.task:full_triage
    reward_range: [0.0, 1.0]